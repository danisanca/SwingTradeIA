# Configuração do Ruff para o projeto SwingTradeIA
# Docs: https://docs.astral.sh/ruff/configuration/

line-length = 120
target-version = "py311"

[lint]
# Regras habilitadas: erros, warnings, pyflakes, isort
select = ["E", "W", "F", "I"]

ignore = [
    "E501",   # line too long — controlado pelo line-length acima
    "E402",   # module level import not at top — necessário para imports condicionais (try/except PyTorch)
    "F841",   # local variable assigned but never used — falsos positivos em try/except
]

[lint.isort]
known-first-party = ["app"]
