name: DQN — Treinamento e Avaliação do Modelo

on:
  workflow_dispatch: # disparo manual pelo GitHub Actions
    inputs:
      ticker:
        description: "Ticker da ação (ex: PETR4, VALE3)"
        required: true
        default: "PETR4"
      episodes:
        description: "Número de episódios de treinamento"
        required: true
        default: "500"
  schedule:
    # Retreina automaticamente toda segunda-feira às 06:00 UTC (03:00 BRT)
    - cron: "0 6 * * 1"

jobs:
  train-model:
    name: 🤖 Treinar modelo DQN — ${{ github.event.inputs.ticker || 'PETR4' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai-service/requirements.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r ai-service/requirements.txt

      - name: Treinar modelo DQN
        working-directory: modelo
        env:
          TICKER: ${{ github.event.inputs.ticker || 'PETR4' }}
          EPISODES: ${{ github.event.inputs.episodes || '500' }}
        run: |
          echo "📈 Iniciando treinamento: ticker=$TICKER, episódios=$EPISODES"
          python train.py --ticker $TICKER --episodes $EPISODES

      - name: Avaliar modelo (vs Buy & Hold)
        working-directory: modelo
        env:
          TICKER: ${{ github.event.inputs.ticker || 'PETR4' }}
        run: |
          echo "📊 Avaliando desempenho do modelo..."
          python evaluate.py --ticker $TICKER

      - name: Salvar pesos do modelo como artefato
        uses: actions/upload-artifact@v4
        with:
          name: dqn-weights-${{ github.event.inputs.ticker || 'PETR4' }}-${{ github.run_number }}
          path: ai-service/app/models/dqn_weights.pth
          retention-days: 30

      - name: Resumo do treinamento
        run: |
          echo "## 🤖 Treinamento concluído!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ticker | ${{ github.event.inputs.ticker || 'PETR4' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Episódios | ${{ github.event.inputs.episodes || '500' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Os pesos foram salvos como artefato nesta execução." >> $GITHUB_STEP_SUMMARY
