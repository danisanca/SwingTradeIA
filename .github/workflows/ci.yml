name: CI — Build & Lint

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  # ─────────────────────────────────────────────
  # FRONTEND — Angular 17
  # ─────────────────────────────────────────────
  frontend:
    name: 🖥️ Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (production)
        working-directory: frontend
        run: npm run build -- --configuration production

  # ─────────────────────────────────────────────
  # BACKEND — C# .NET 8
  # ─────────────────────────────────────────────
  backend:
    name: ⚙️ Backend (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore packages
        working-directory: backend/SwingTradeIA.Api
        run: dotnet restore

      - name: Build
        working-directory: backend/SwingTradeIA.Api
        run: dotnet build --no-restore --configuration Release

  # ─────────────────────────────────────────────
  # AI SERVICE — Python FastAPI
  # ─────────────────────────────────────────────
  ai-service:
    name: 🐍 AI Service (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        working-directory: ai-service
        run: |
          python -m pip install --upgrade pip
          # Instala PyTorch CPU-only (mais leve no CI)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Lint com Ruff
        working-directory: ai-service
        run: |
          pip install ruff
          # Usa o ruff.toml do diretório — não sobrescreve config com flags inline
          ruff check app/

      - name: Verificar imports e sintaxe
        working-directory: ai-service
        run: python -c "import app.main; print('✅ Imports OK')"
